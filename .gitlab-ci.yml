image: maven:3.9-eclipse-temurin-17

stages:
  - build
  - test
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository

build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS compile

test:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml

package:
  stage: package
  script:
    - mvn $MAVEN_CLI_OPTS package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$EC2_SSH_KEY"
    - ssh-add "$EC2_SSH_KEY"
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
  script:
    - scp -o StrictHostKeyChecking=no Dockerfile $EC2_USER@$EC2_HOST:~/Dockerfile
    - scp -o StrictHostKeyChecking=no -r target $EC2_USER@$EC2_HOST:~/target
    - ssh $EC2_USER@$EC2_HOST "
        docker stop penny-pilot || true &&
        docker rm penny-pilot || true &&
        docker build -t penny-pilot . &&
        docker run -d --name penny-pilot -p 8080:8080 penny-pilot
      "
  only:
    - main
