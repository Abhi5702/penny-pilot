#mysql configurations

spring.datasource.url=jdbc:mysql://localhost:3306/pennypilot
spring.datasource.username=root
spring.datasource.password=param

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mysupersecurejwtsecretkeythatshouldbeatleast32chars
server.servlet.context-path=/api/v1.0

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${PENNYPILOT_BREVO_USERNAME}
spring.mail.password=${PENNYPILOT_BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.activation.url=http://localhost:8080
app.frontend.url=http://localhost:5173