#mysql configurations

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mysupersecurejwtsecretkeythatshouldbeatleast32chars
server.servlet.context-path=/api/v1.0

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${PENNYPILOT_BREVO_USERNAME}
spring.mail.password=${PENNYPILOT_BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.activation.url=${BACKEND_URL}
app.frontend.url=${FRONTEND_URL}

SPRING_PROFILES_ACTIVE=prod

mail.from=${MAIL_FROM:rsap4505@gmail.com}